[www]
user = www-data
group = www-data

listen = /run/php/php8.1-fpm.sock
listen.owner = www-data
listen.group = www-data
listen.mode = 0660

pm = dynamic
pm.max_children = 10
pm.start_servers = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 3
pm.max_requests = 500

; Environment variables
env[HOSTNAME] = $HOSTNAME
env[PATH] = /usr/local/bin:/usr/bin:/bin
env[TMP] = /tmp
env[TMPDIR] = /tmp
env[TEMP] = /tmp

; Clear environment in FPM workers
clear_env = no

; Log errors
php_admin_value[error_log] = /var/www/meshsilo/logs/php-error.log
php_admin_flag[log_errors] = on

; Security settings
php_admin_value[open_basedir] = /var/www/meshsilo:/tmp:/usr/share/php
