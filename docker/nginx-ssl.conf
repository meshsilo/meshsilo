# MeshSilo Nginx Configuration with SSL/TLS Optimization
#
# This is an optimized SSL configuration. To use:
# 1. Obtain SSL certificates (Let's Encrypt recommended)
# 2. Place them in /etc/nginx/ssl/
# 3. Replace /etc/nginx/sites-available/default with this file
#
# Benefits:
# - TLS 1.3 (fastest, most secure)
# - OCSP Stapling (faster certificate validation)
# - Session tickets (faster reconnections)
# - HTTP/2 (multiplexing, header compression)
# - HSTS (enforced HTTPS)

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Redirect all HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2 default_server;
    listen [::]:443 ssl http2 default_server;

    root /var/www/meshsilo;
    index index.php;
    server_name _;

    # ========================================
    # SSL/TLS Configuration
    # ========================================

    # Certificate files (update paths as needed)
    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    # TLS 1.2 and 1.3 only (disable older versions)
    ssl_protocols TLSv1.2 TLSv1.3;

    # Modern cipher suite (TLS 1.3 ciphers are automatic)
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # OCSP Stapling - speeds up certificate validation
    ssl_stapling on;
    ssl_stapling_verify on;
    ssl_trusted_certificate /etc/nginx/ssl/chain.pem;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # SSL Session caching - faster reconnections
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets on;

    # DH parameters for DHE ciphers (generate with: openssl dhparam -out dhparam.pem 2048)
    # ssl_dhparam /etc/nginx/ssl/dhparam.pem;

    # ========================================
    # Security Headers
    # ========================================

    # HSTS - force HTTPS for 1 year (include subdomains, allow preload)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Other security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Content Security Policy (adjust as needed)
    # add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdnjs.cloudflare.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self'; frame-ancestors 'self';" always;

    # ========================================
    # Compression
    # ========================================

    # Enable ETags
    etag on;

    # Brotli compression (15-20% better than gzip)
    brotli on;
    brotli_comp_level 6;
    brotli_min_length 1000;
    brotli_types text/plain text/css text/xml application/json application/javascript application/xml application/xml+rss text/javascript application/x-javascript image/svg+xml;

    # Gzip fallback
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml application/xml+rss text/javascript application/x-javascript image/svg+xml;

    # ========================================
    # Security: Deny Sensitive Files
    # ========================================

    location ~ /\.(git|claude|htaccess|env) {
        deny all;
        return 404;
    }

    location ~ \.(db|sqlite|sql|log)$ {
        deny all;
        return 404;
    }

    location = /config.local.php {
        deny all;
        return 404;
    }

    location ~ ^/app/ {
        deny all;
        return 404;
    }

    location ~ ^/storage/ {
        deny all;
        return 404;
    }

    # ========================================
    # Static Assets
    # ========================================

    location /assets/ {
        alias /var/www/meshsilo/assets/;
        expires 1w;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    location = /sw.js {
        alias /var/www/meshsilo/public/sw.js;
        add_header Cache-Control "no-cache";
        add_header Service-Worker-Allowed "/";
    }

    location = /manifest.json {
        alias /var/www/meshsilo/public/manifest.json;
        add_header Cache-Control "no-cache";
    }

    # Static file caching with ETags
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|webp)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        add_header Vary "Accept-Encoding";
    }

    # 3D model files
    location ~* \.(stl|3mf|obj|step)$ {
        expires -1;
        add_header Cache-Control "no-cache";
    }

    # ========================================
    # PHP Processing
    # ========================================

    location / {
        try_files $uri $uri/ /index.php?route=$uri&$args;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.1-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;

        fastcgi_read_timeout 300;
        fastcgi_send_timeout 300;

        # HTTP/2 Server Push via Link headers
        http2_push_preload on;
    }

    client_max_body_size 100M;

    # Health check
    location = /health {
        access_log off;
        return 200 "OK";
        add_header Content-Type text/plain;
    }

    # API responses
    location /api/ {
        try_files $uri $uri/ /index.php?route=$uri&$args;
        add_header Cache-Control "public, max-age=60, stale-while-revalidate=300";
        add_header Vary "Accept, Authorization";
    }

    # Actions
    location /actions/ {
        try_files $uri $uri/ /index.php?route=$uri&$args;
        add_header Cache-Control "private, no-cache";
    }
}
