server {
    listen 80 default_server;
    listen [::]:80 default_server;

    # HTTP/2 and HTTP/3 (QUIC) - uncomment when SSL is configured:
    # listen 443 ssl default_server;
    # listen [::]:443 ssl default_server;
    # http2 on;
    #
    # # HTTP/3 (QUIC) - requires nginx 1.25+ or nginx-quic
    # listen 443 quic reuseport;
    # listen [::]:443 quic reuseport;
    # add_header Alt-Svc 'h3=":443"; ma=86400' always;
    #
    # # SSL configuration for HTTP/3
    # ssl_certificate /etc/nginx/ssl/cert.pem;
    # ssl_certificate_key /etc/nginx/ssl/key.pem;
    # ssl_protocols TLSv1.3;
    # ssl_early_data on;
    # ssl_session_tickets on;

    root /var/www/meshsilo;
    index index.php;

    server_name _;

    # Enable ETags for cache validation
    etag on;

    # Brotli compression (15-20% better than gzip)
    # Requires nginx-module-brotli
    brotli on;
    brotli_comp_level 6;
    brotli_min_length 1000;
    brotli_types text/plain text/css text/xml application/json application/javascript application/xml application/xml+rss text/javascript application/x-javascript image/svg+xml;

    # Compression Dictionary Transport (shared Brotli dictionaries)
    # Enable for supported browsers - provides 10-25% additional compression
    # Browsers advertise dictionary support via Accept-Encoding: br, zstd-d
    map $http_accept_encoding $use_dictionary {
        default "";
        "~*sbr" "use-as-dictionary";
    }

    # Gzip compression fallback for clients without Brotli support
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml application/xml+rss text/javascript application/x-javascript image/svg+xml;

    # Security: Deny access to sensitive files
    location ~ /\.(git|claude|htaccess) {
        deny all;
        return 404;
    }

    location ~ \.(db|sqlite|sql|log)$ {
        deny all;
        return 404;
    }

    location = /config.local.php {
        deny all;
        return 404;
    }

    # Deny access to app directory (accessed via router only)
    location ~ ^/app/ {
        deny all;
        return 404;
    }

    # Deny access to storage directory
    location ~ ^/storage/ {
        deny all;
        return 404;
    }

    # Allow access to uploaded assets
    location /assets/ {
        alias /var/www/meshsilo/assets/;
        expires 1w;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # Serve public directory files (sw.js, manifest.json, etc.)
    location = /sw.js {
        alias /var/www/meshsilo/public/sw.js;
        add_header Cache-Control "no-cache";
        add_header Service-Worker-Allowed "/";
    }

    location = /manifest.json {
        alias /var/www/meshsilo/public/manifest.json;
        add_header Cache-Control "no-cache";
    }

    # Main location - route requests through PHP
    location / {
        try_files $uri $uri/ /index.php?route=$uri&$args;
    }

    # PHP processing via PHP-FPM
    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.1-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;

        # Increase timeouts for large file uploads
        fastcgi_read_timeout 300;
        fastcgi_send_timeout 300;

        # Enable HTTP/2 Server Push via Link headers
        # Uncomment when using HTTPS with HTTP/2:
        # http2_push_preload on;
    }

    # Large file upload support
    client_max_body_size 100M;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Static file caching with ETags for validation
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|webp)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        add_header Vary "Accept-Encoding";
        # ETags enabled globally, Last-Modified sent automatically

        # Compression Dictionary Transport support
        # Tell browsers this resource can be used as a shared dictionary
        add_header Use-As-Dictionary "match=\"/public/*\"" $use_dictionary;
        add_header Dictionary-ID "meshsilo-v1";
    }

    # Serve shared dictionary file for enhanced compression
    location = /public/dictionary.bin {
        alias /var/www/meshsilo/public/dictionary.bin;
        add_header Content-Type "application/dictionary";
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header Access-Control-Allow-Origin "*";
    }

    # 3D model files - no caching, allow downloads
    location ~* \.(stl|3mf|obj|step)$ {
        expires -1;
        add_header Cache-Control "no-cache";
    }

    # Disable access log for health checks
    location = /health {
        access_log off;
        return 200 "OK";
        add_header Content-Type text/plain;
    }

    # API responses - short cache with validation
    location /api/ {
        try_files $uri $uri/ /index.php?route=$uri&$args;
        add_header Cache-Control "public, max-age=60, stale-while-revalidate=300";
        add_header Vary "Accept, Authorization";
    }

    # Actions that return JSON - no cache for mutations, short cache for reads
    location /actions/ {
        try_files $uri $uri/ /index.php?route=$uri&$args;
        # POST/PUT/DELETE handled in PHP, GET requests can be cached briefly
        add_header Cache-Control "private, no-cache";
    }
}
