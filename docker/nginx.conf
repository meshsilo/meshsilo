server {
    listen 80 default_server;
    listen [::]:80 default_server;

    root /var/www/silo;
    index index.php;

    server_name _;

    # Security: Deny access to sensitive files
    location ~ /\.(git|claude|htaccess) {
        deny all;
        return 404;
    }

    location ~ \.(db|sqlite|sql|log)$ {
        deny all;
        return 404;
    }

    location = /config.local.php {
        deny all;
        return 404;
    }

    location ~ ^/(db|logs)/ {
        deny all;
        return 404;
    }

    # Main location - route requests through PHP
    location / {
        try_files $uri $uri/ /index.php?route=$uri&$args;
    }

    # PHP processing via PHP-FPM
    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.1-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;

        # Increase timeouts for large file uploads
        fastcgi_read_timeout 300;
        fastcgi_send_timeout 300;
    }

    # Large file upload support
    client_max_body_size 100M;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Static file caching
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # 3D model files - no caching, allow downloads
    location ~* \.(stl|3mf|obj|step)$ {
        expires -1;
        add_header Cache-Control "no-cache";
    }

    # Disable access log for health checks
    location = /health {
        access_log off;
        return 200 "OK";
        add_header Content-Type text/plain;
    }
}
