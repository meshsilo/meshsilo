<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Categories - Silo</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="site-header">
        <div class="header-content">
            <a href="/" class="logo">
                <span class="logo-icon">&#9653;</span>
                <span class="logo-text">Silo</span>
            </a>
            <nav class="main-nav">
                <a href="/">Browse</a>
                <a href="categories.html" class="active">Categories</a>
                <a href="upload.html">Upload</a>
            </nav>
            <div class="header-actions">
                <input type="search" class="search-bar" placeholder="Search models...">
                <a href="login.html" class="btn btn-primary">Log In</a>
            </div>
        </div>
    </header>

    <main>
        <div class="page-container-wide">
            <div class="page-header">
                <h1>Categories</h1>
                <p>Browse models by category</p>
            </div>

            <div class="categories-grid-large">
                <a href="category.html?cat=functional" class="category-card-large">
                    <div class="category-icon">&#9881;</div>
                    <h2 class="category-name">Functional</h2>
                    <p class="category-count">24 models</p>
                </a>
                <a href="category.html?cat=decorative" class="category-card-large">
                    <div class="category-icon">&#10022;</div>
                    <h2 class="category-name">Decorative</h2>
                    <p class="category-count">18 models</p>
                </a>
                <a href="category.html?cat=tools" class="category-card-large">
                    <div class="category-icon">&#9874;</div>
                    <h2 class="category-name">Tools</h2>
                    <p class="category-count">12 models</p>
                </a>
                <a href="category.html?cat=gaming" class="category-card-large">
                    <div class="category-icon">&#9918;</div>
                    <h2 class="category-name">Gaming</h2>
                    <p class="category-count">31 models</p>
                </a>
                <a href="category.html?cat=art" class="category-card-large">
                    <div class="category-icon">&#9733;</div>
                    <h2 class="category-name">Art</h2>
                    <p class="category-count">15 models</p>
                </a>
                <a href="category.html?cat=mechanical" class="category-card-large">
                    <div class="category-icon">&#9211;</div>
                    <h2 class="category-name">Mechanical</h2>
                    <p class="category-count">9 models</p>
                </a>
            </div>
        </div>
    </main>

    <footer class="site-footer">
        <div class="footer-content">
            <div class="footer-brand">
                <span class="logo-icon">&#9653;</span>
                <span class="logo-text">Silo</span>
                <p>3D Model Storage</p>
            </div>
            <nav class="footer-nav">
                <a href="#">About</a>
                <a href="#">Contact</a>
                <a href="#">Privacy</a>
                <a href="#">Terms</a>
            </nav>
        </div>
    </footer>
</body>
</html>
