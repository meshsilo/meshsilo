version: '3.8'

services:
  meshsilo:
    build:
      context: .
      dockerfile: Dockerfile
    image: meshsilo:latest
    container_name: meshsilo
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      # Persistent data volumes
      - meshsilo_assets:/var/www/meshsilo/storage/assets
      - meshsilo_db:/var/www/meshsilo/storage/db
      - meshsilo_logs:/var/www/meshsilo/storage/logs
      # Optional: Mount custom config file
      # - ./config.local.php:/var/www/meshsilo/config.local.php:ro
      # Optional: Mount seed models for demo mode (place .stl/.3mf files here)
      # - ./demo-seed:/var/www/meshsilo/storage/demo-seed:ro
    environment:
      # Database Configuration (sqlite or mysql)
      - MESHSILO_DB_TYPE=sqlite
      # For MySQL, uncomment and configure:
      # - MESHSILO_DB_TYPE=mysql
      # - MESHSILO_DB_HOST=db
      # - MESHSILO_DB_NAME=meshsilo
      # - MESHSILO_DB_USER=meshsilo
      # - MESHSILO_DB_PASS=your_password

      # Site Configuration
      - MESHSILO_SITE_NAME=MeshSilo
      - MESHSILO_SITE_DESCRIPTION=3D Model Asset Manager
      # Set this to your external URL if using reverse proxy
      # - MESHSILO_SITE_URL=https://meshsilo.example.com

      # File Upload Settings (in bytes, default 100MB)
      - MESHSILO_MAX_UPLOAD_SIZE=104857600
      - MESHSILO_ALLOWED_EXTENSIONS=stl,3mf,obj,ply,amf,gcode,glb,gltf,fbx,dae,blend,step,stp,iges,igs,3ds,dxf,off,x3d

      # Deduplication
      - MESHSILO_DEDUP_ENABLED=true

      # Demo Mode (populates sample models, resets periodically)
      # - MESHSILO_DEMO_MODE=true
      # - MESHSILO_DEMO_RESET_INTERVAL=3600

      # Development/Debug Settings
      # - MESHSILO_ENABLE_QUERY_STATS=true

      # OIDC/SSO Configuration (optional)
      # - MESHSILO_OIDC_PROVIDER_URL=https://auth.example.com
      # - MESHSILO_OIDC_CLIENT_ID=meshsilo
      # - MESHSILO_OIDC_CLIENT_SECRET=your_client_secret
      # - MESHSILO_OIDC_REDIRECT_URI=https://meshsilo.example.com/oidc-callback.php
      # - MESHSILO_OIDC_SCOPES=openid profile email
      # - MESHSILO_OIDC_USERNAME_CLAIM=preferred_username
      # - MESHSILO_OIDC_AUTO_REGISTER=true

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

# Example with MySQL database
# Uncomment to use MySQL instead of SQLite
#
#   db:
#     image: mysql:8.0
#     container_name: meshsilo-db
#     restart: unless-stopped
#     environment:
#       - MYSQL_ROOT_PASSWORD=root_password
#       - MYSQL_DATABASE=meshsilo
#       - MYSQL_USER=meshsilo
#       - MYSQL_PASSWORD=your_password
#     volumes:
#       - meshsilo_mysql:/var/lib/mysql
#     healthcheck:
#       test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
#       interval: 10s
#       timeout: 5s
#       retries: 5

volumes:
  meshsilo_assets:
    driver: local
  meshsilo_db:
    driver: local
  meshsilo_logs:
    driver: local
  # meshsilo_mysql:
  #   driver: local
