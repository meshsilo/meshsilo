services:
  meshsilo:
    image: ghcr.io/meshsilo/meshsilo:latest
    container_name: meshsilo
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      # Persistent data volumes
      - meshsilo_assets:/var/www/meshsilo/storage/assets
      - meshsilo_db:/var/www/meshsilo/storage/db
      - meshsilo_logs:/var/www/meshsilo/storage/logs
      - meshsilo_cache:/var/www/meshsilo/storage/cache
      - meshsilo_plugins:/var/www/meshsilo/plugins
    environment:
      # Site Configuration
      - MESHSILO_SITE_NAME=MeshSilo
      - MESHSILO_SITE_DESCRIPTION=3D Model Asset Manager
      # Set this to your external URL if using reverse proxy
      # - MESHSILO_SITE_URL=https://meshsilo.example.com

      # Database — MySQL (default)
      # The install wizard will auto-detect these and skip the database step
      - MESHSILO_DB_TYPE=mysql
      - MESHSILO_DB_HOST=db
      - MESHSILO_DB_PORT=3306
      - MESHSILO_DB_NAME=meshsilo
      - MESHSILO_DB_USER=meshsilo
      - MESHSILO_DB_PASS=meshsilo_password

      # File Upload Settings (in bytes, default 100MB)
      - MESHSILO_MAX_UPLOAD_SIZE=104857600
      - MESHSILO_ALLOWED_EXTENSIONS=stl,3mf,obj,ply,amf,gcode,glb,gltf,fbx,dae,blend,step,stp,iges,igs,3ds,dxf,off,x3d,zip,lys,ctb,pwmo,sl1,jpg,jpeg,png,gif,webp,pdf,txt,md

      # Deduplication
      - MESHSILO_DEDUP_ENABLED=true

      # Development/Debug Settings
      # - MESHSILO_ENABLE_QUERY_STATS=true

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    container_name: meshsilo-db
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=root_password_change_me
      - MYSQL_DATABASE=meshsilo
      - MYSQL_USER=meshsilo
      - MYSQL_PASSWORD=meshsilo_password
    volumes:
      - meshsilo_mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

# To use SQLite instead of MySQL:
#   1. Remove or comment out the db service above
#   2. Remove or comment out the MESHSILO_DB_* environment variables
#   3. Remove or comment out the depends_on section
#   The install wizard will default to SQLite when no MySQL env vars are set.

volumes:
  meshsilo_assets:
    driver: local
  meshsilo_db:
    driver: local
  meshsilo_logs:
    driver: local
  meshsilo_cache:
    driver: local
  meshsilo_plugins:
    driver: local
  meshsilo_mysql:
    driver: local
