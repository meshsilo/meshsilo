name: Build and Push Docker Image

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Resolve pushed image reference
        if: github.event_name != 'pull_request'
        id: image_ref
        run: |
          IMAGE_NAME_LC=$(echo "${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')
          IMAGE_REF="${{ env.REGISTRY }}/${IMAGE_NAME_LC}@${{ steps.push.outputs.digest }}"
          echo "image_ref=${IMAGE_REF}" >> $GITHUB_OUTPUT

      - name: Retry docker pull (for robustness)
        if: github.event_name != 'pull_request'
        run: |
          set -euo pipefail
          IMAGE="${{ steps.image_ref.outputs.image_ref }}"
          echo "Will attempt to pull $IMAGE up to 3 times"
          tries=0
          until [ "$tries" -ge 3 ]
          do
            if docker pull "$IMAGE"; then
              echo "Pulled $IMAGE"
              break
            else
              tries=$((tries+1))
              echo "Pull failed (attempt $tries). Retrying in 5s..."
              sleep 5
            fi
          done
          if [ "$tries" -ge 3 ]; then
            echo "docker pull failed after 3 attempts"
            exit 1
          fi
        shell: bash

      - name: Install Syft (Anchore) CLI
        if: github.event_name != 'pull_request'
        run: |
          set -euo pipefail
          echo "Installing syft (Anchore)"
          # Use Anchore's official install script to install latest syft into /usr/local/bin
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sudo sh -s -- -b /usr/local/bin
          syft version
        shell: bash

      - name: Generate SBOM (CycloneDX) with syft
        if: github.event_name != 'pull_request'
        run: |
          set -euo pipefail
          IMAGE="${{ steps.image_ref.outputs.image_ref }}"
          echo "Generating CycloneDX SBOM for $IMAGE"
          syft "$IMAGE" -o cyclonedx-json=sbom.cyclonedx.json
          echo "SBOM saved to sbom.cyclonedx.json"
        shell: bash

      - name: Debug show SBOM and image info
        if: github.event_name != 'pull_request'
        run: |
          echo "Image: ${{ steps.image_ref.outputs.image_ref }}"
          echo "Digest: ${{ steps.push.outputs.digest }}"
          echo "Generated SBOM (first 200 lines):"
          ls -la sbom.cyclonedx.json || true
          sed -n '1,200p' sbom.cyclonedx.json || true
        shell: bash

      - name: Install cosign (Sigstore)
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@v2
        with:
          version: latest

      - name: Keyless attestation with cosign (predicate = SBOM)
        if: github.event_name != 'pull_request'
        run: |
          set -euo pipefail
          IMAGE="${{ steps.image_ref.outputs.image_ref }}"
          PRED="sbom.cyclonedx.json"

          echo "Performing keyless cosign attest for $IMAGE with predicate $PRED"

          # Try the attest up to 3 times to handle transient network errors
          tries=0
          until [ "$tries" -ge 3 ]
          do
            if cosign attest --yes --predicate "$PRED" --type cyclonedx "$IMAGE"; then
              echo "Attestation succeeded"
              break
            else
              tries=$((tries+1))
              echo "Attest failed (attempt $tries). Retrying in 5s..."
              sleep 5
            fi
          done
          if [ "$tries" -ge 3 ]; then
            echo "cosign attest failed after 3 attempts"
            exit 1
          fi
        shell: bash

      - name: Optional Upload SBOM artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.cyclonedx.json
