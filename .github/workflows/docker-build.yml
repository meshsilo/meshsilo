name: Build and Push Docker Image

on:
  push:
    branches:
      - main
      - dev
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Determine version
        id: version
        run: echo "version=$(git describe --tags --abbrev=0 2>/dev/null | sed 's/^v//' || echo 'dev')" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5.4.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: MESHSILO_VERSION=${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Resolve pushed image reference
        if: github.event_name != 'pull_request'
        id: image_ref
        run: |
          IMAGE_NAME_LC=$(echo "${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')
          IMAGE_REF="${{ env.REGISTRY }}/${IMAGE_NAME_LC}@${{ steps.push.outputs.digest }}"
          echo "image_ref=${IMAGE_REF}" >> $GITHUB_OUTPUT

      - name: Retry docker pull (for robustness)
        if: github.event_name != 'pull_request'
        run: |
          set -euo pipefail
          IMAGE="${{ steps.image_ref.outputs.image_ref }}"
          echo "Will attempt to pull $IMAGE up to 3 times"
          tries=0
          until [ "$tries" -ge 3 ]
          do
            if docker pull "$IMAGE"; then
              echo "Pulled $IMAGE"
              break
            else
              tries=$((tries+1))
              echo "Pull failed (attempt $tries). Retrying in 5s..."
              sleep 5
            fi
          done
          if [ "$tries" -ge 3 ]; then
            echo "docker pull failed after 3 attempts"
            exit 1
          fi
        shell: bash

      - name: Generate SBOM (CycloneDX) with Syft
        if: github.event_name != 'pull_request'
        # Pinned Anchore action (bundles a released, pinned syft) replaces the
        # previous `curl ... /main/install.sh | sudo sh` bootstrap. No unpinned
        # `main` ref, no pipe to sudo. upload-artifact is disabled here because a
        # dedicated upload step below publishes the SBOM.
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ${{ steps.image_ref.outputs.image_ref }}
          format: cyclonedx-json
          output-file: sbom.cyclonedx.json
          upload-artifact: false

      - name: Debug show SBOM and image info
        if: github.event_name != 'pull_request'
        run: |
          echo "Image: ${{ steps.image_ref.outputs.image_ref }}"
          echo "Digest: ${{ steps.push.outputs.digest }}"
          echo "Generated SBOM (first 200 lines):"
          ls -la sbom.cyclonedx.json || true
          sed -n '1,200p' sbom.cyclonedx.json || true
        shell: bash

      - name: Install cosign (Sigstore)
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@7e8b541eb2e61bf99390e1afd4be13a184e9ebc5 # v3.10.1

      - name: Keyless attestation with cosign (predicate = SBOM)
        if: github.event_name != 'pull_request'
        run: |
          set -euo pipefail
          IMAGE="${{ steps.image_ref.outputs.image_ref }}"
          PRED="sbom.cyclonedx.json"

          echo "Performing keyless cosign attest for $IMAGE with predicate $PRED"

          # Try the attest up to 3 times to handle transient network errors
          tries=0
          until [ "$tries" -ge 3 ]
          do
            if cosign attest --yes --predicate "$PRED" --type cyclonedx "$IMAGE"; then
              echo "Attestation succeeded"
              break
            else
              tries=$((tries+1))
              echo "Attest failed (attempt $tries). Retrying in 5s..."
              sleep 5
            fi
          done
          if [ "$tries" -ge 3 ]; then
            echo "cosign attest failed after 3 attempts"
            exit 1
          fi
        shell: bash

      - name: Optional Upload SBOM artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: sbom
          path: sbom.cyclonedx.json
