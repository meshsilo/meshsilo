<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In - Silo</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="site-header">
        <div class="header-content">
            <a href="/" class="logo">
                <span class="logo-icon">&#9653;</span>
                <span class="logo-text">Silo</span>
            </a>
            <nav class="main-nav">
                <a href="/">Browse</a>
                <a href="#">Categories</a>
                <a href="upload.html">Upload</a>
            </nav>
            <div class="header-actions">
                <input type="search" class="search-bar" placeholder="Search models...">
                <a href="login.html" class="btn btn-primary">Log In</a>
            </div>
        </div>
    </header>

    <main>
        <div class="auth-container">
            <div class="auth-card">
                <div class="auth-header">
                    <span class="logo-icon">&#9653;</span>
                    <h1>Welcome back</h1>
                    <p>Log in to your Silo account</p>
                </div>

                <form class="auth-form" action="#" method="post">
                    <div class="form-group">
                        <label for="username">Username or Email</label>
                        <input type="text" id="username" name="username" class="form-input" placeholder="Enter your username or email" required>
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" class="form-input" placeholder="Enter your password" required>
                    </div>

                    <div class="form-group form-row">
                        <label class="checkbox-inline">
                            <input type="checkbox" name="remember">
                            <span>Remember me</span>
                        </label>
                        <a href="#" class="form-link">Forgot password?</a>
                    </div>

                    <button type="submit" class="btn btn-primary btn-full">Log In</button>
                </form>
            </div>
        </div>
    </main>

    <footer class="site-footer">
        <div class="footer-content">
            <div class="footer-brand">
                <span class="logo-icon">&#9653;</span>
                <span class="logo-text">Silo</span>
                <p>3D Model Storage</p>
            </div>
            <nav class="footer-nav">
                <a href="#">About</a>
                <a href="#">Contact</a>
                <a href="#">Privacy</a>
                <a href="#">Terms</a>
            </nav>
        </div>
    </footer>
</body>
</html>
