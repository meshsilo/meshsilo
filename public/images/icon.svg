<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="64" fill="url(#bg)"/>
  <!-- 3D Cube/Silo Icon -->
  <g transform="translate(256, 256)">
    <!-- Hexagonal silo shape -->
    <path d="M0,-140 L121,-70 L121,70 L0,140 L-121,70 L-121,-70 Z"
          fill="none" stroke="white" stroke-width="16" stroke-linejoin="round"/>
    <!-- Inner lines for 3D effect -->
    <line x1="0" y1="-140" x2="0" y2="140" stroke="white" stroke-width="8" opacity="0.6"/>
    <line x1="-121" y1="-70" x2="121" y2="70" stroke="white" stroke-width="8" opacity="0.6"/>
    <line x1="121" y1="-70" x2="-121" y2="70" stroke="white" stroke-width="8" opacity="0.6"/>
    <!-- Center dot -->
    <circle cx="0" cy="0" r="20" fill="white"/>
  </g>
</svg>
